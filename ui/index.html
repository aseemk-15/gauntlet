<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Chart — The Gauntlet</title>
<style>
  :root{
    --bg:#E9EDF1; --chrome:#FFFFFF; --line:#D5DCE3; --ink:#1C2833; --mut:#5D6C7B;
    --paper:#FFFFFF; --pen:#C43B2E; --penbg:#FBEFED; --amber:#8A5B00;
    --ambbg:#FBF4E4; --grn:#1F7A3F; --grnbg:#EFF7F1; --blue:#0B63C5;
    --mono:ui-monospace,'SF Mono',Menlo,Consolas,monospace;
    --serif:Charter,Georgia,serif;
    --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  }
  *{box-sizing:border-box;margin:0}
  body{background:var(--bg);color:var(--ink);font:14px/1.5 var(--sans);
       padding-bottom:44px}
  /* patient banner */
  .banner{background:#22303E;color:#fff;padding:9px 20px;display:flex;
          align-items:center;gap:16px;flex-wrap:wrap}
  .banner .pt{font:700 16px var(--sans)}
  .banner .demo{font:11.5px var(--sans);color:#9FB0C0}
  .banner .right{margin-left:auto;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  select{font:12px var(--sans);border:1px solid var(--line);border-radius:5px;
         padding:5px 8px;background:#fff;color:var(--ink)}
  .runbtn{font:700 12.5px var(--sans);background:var(--pen);border:1px solid var(--pen);
          color:#fff;border-radius:6px;padding:8px 16px;cursor:pointer;min-width:190px}
  .runbtn:hover{background:#AD3226}
  .runbtn:disabled{opacity:.55;cursor:default}
  .runbtn.rerun{background:#fff;color:var(--amber);border-color:#D8B96A}
  button:focus-visible{outline:2px solid #7EB3E8;outline-offset:2px}
  /* gauntlet pill */
  #gpill{display:none;align-items:center;gap:9px;background:#182430;
         border:1px solid #3A4C5E;border-radius:16px;padding:5px 13px;
         font:11.5px var(--mono);color:#C8D2DC;cursor:pointer}
  #gpill .dots{display:flex;gap:3px}
  #gpill .dots i{width:7px;height:7px;border-radius:50%;background:#3D4F61;
                 animation:gp 1.1s ease-in-out infinite}
  #gpill .dots i:nth-child(2){animation-delay:.18s}
  #gpill .dots i:nth-child(3){animation-delay:.36s}
  #gpill .dots i:nth-child(4){animation-delay:.54s}
  @keyframes gp{50%{background:#7A93AD;box-shadow:0 0 5px rgba(122,147,173,.8)}}
  #gpill b{color:#E2A33C;font-weight:700}
  #gpill.done .dots i{animation:none;background:#2E7D4F}
  @media(prefers-reduced-motion:reduce){#gpill .dots i{animation:none}}
  /* tabs */
  .tabs{background:var(--chrome);border-bottom:1px solid var(--line);
        display:flex;gap:2px;padding:0 16px;overflow-x:auto}
  .tab{font:600 13px var(--sans);color:var(--mut);border:0;background:none;
       padding:11px 24px 11px 14px;cursor:pointer;border-bottom:3px solid transparent;
       white-space:nowrap;position:relative}
  .tab.on{color:var(--ink);border-bottom-color:var(--pen)}
  .tab .bdg{display:none;position:absolute;top:6px;right:2px;background:var(--pen);
            color:#fff;font:700 9.5px var(--sans);border-radius:8px;
            min-width:15px;height:15px;line-height:15px;text-align:center;padding:0 3px}
  .tab .bdg.grn{background:var(--grn)}
  /* chip bar */
  .chipbar{padding:8px 20px 0;display:flex;gap:10px;align-items:center;flex-wrap:wrap;
           font:12px var(--sans);color:var(--mut)}
  .chipbar>span{display:none}
  #verifychip{background:var(--grnbg);border:1px solid #BFDCC8;color:var(--grn);
              border-radius:14px;padding:3px 13px;font-weight:600}
  #verifychip small{color:#4A5866;font-weight:500;font-size:12px}
  #residchip{background:var(--penbg);border:1px solid #E7C2BD;color:var(--pen);
             border-radius:14px;padding:3px 13px;font-weight:600}
  #findchip{background:var(--ambbg);border:1px solid #E4D2A8;color:var(--amber);
            border-radius:14px;padding:3px 13px;font-weight:600;cursor:pointer}
  /* panes */
  .page{max-width:920px;margin:10px auto 60px;background:var(--paper);
        border:1px solid var(--line);border-radius:8px;
        box-shadow:0 2px 14px rgba(28,40,51,.07);padding:26px 40px;min-height:180px}
  .pane{display:none}
  .pane.on{display:block}
  .pane h4{font:700 11.5px var(--sans);letter-spacing:.1em;color:var(--mut);
           text-transform:uppercase;margin:16px 0 4px}
  .pane h4:first-child{margin-top:0}
  .ln{font:13.5px/1.65 var(--serif);padding:1px 3px;border-radius:2px}
  .ln.marked{background:var(--penbg);border-bottom:2px solid var(--pen);
             cursor:pointer}
  .ln.marked:hover{background:#F7E2DF}
  .ln.marked.resolved{background:var(--grnbg);border-bottom-color:var(--grn)}
  .ln.marked.waived{background:#F2F4F6;border-bottom-color:#B9C4CE}
  .exchip{display:inline-block;font:700 10px var(--sans);color:#fff;
          background:var(--pen);border-radius:50%;width:16px;height:16px;
          line-height:16px;text-align:center;margin-left:6px;position:relative;top:-2px}
  .ln.marked.resolved .exchip{background:var(--grn)}
  .ln.marked.waived .exchip{background:#9AA7B2}
  .ins{font:13.5px/1.6 var(--serif);color:var(--grn);background:var(--grnbg);
       border-left:3px solid var(--grn);padding:3px 10px;margin:4px 0;
       border-radius:0 3px 3px 0}
  .ins .tag{font:700 9.5px var(--sans);letter-spacing:.1em;color:var(--grn);display:block}
  /* plan tab extras */
  .planbar{display:flex;gap:10px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
  .planbar .cap{font:11px var(--sans);color:var(--mut)}
  .editbtn{font:600 12px var(--sans);border:1px solid var(--line);border-radius:5px;
           background:#fff;color:var(--mut);padding:6px 12px;cursor:pointer}
  .editbtn:hover{color:var(--ink);border-color:var(--mut)}
  #planedit{display:none;width:100%;min-height:180px;font:13px/1.6 var(--mono);
            border:1px solid #CFE0F2;border-radius:6px;padding:12px;color:var(--ink)}
  .editnote{display:none;font:11px var(--sans);color:var(--amber);
            background:var(--ambbg);border:1px solid #E4D2A8;border-radius:5px;
            padding:5px 10px;margin-bottom:8px}
  #flist{margin-top:14px;border-top:1px solid var(--line);padding-top:10px}
  #flist .fl{font:12.5px var(--sans);padding:3px 0;cursor:pointer;color:var(--ink)}
  #flist .fl:hover{color:var(--blue)}
  #flist .fl .l{display:inline-block;font:700 10px var(--sans);color:#fff;
                background:var(--pen);border-radius:50%;width:15px;height:15px;
                line-height:15px;text-align:center;margin-right:7px}
  #flist .fl.resolved .l{background:var(--grn)}
  #flist .fl.waived .l{background:#9AA7B2}
  #flist .fl small{color:var(--mut)}
  /* popover */
  #pop{position:absolute;z-index:30;width:430px;max-width:92vw;background:#fff;
       border:1px solid var(--line);border-top:3px solid var(--pen);border-radius:8px;
       box-shadow:0 14px 40px rgba(28,40,51,.22);padding:15px 17px;display:none}
  #pop.res{border-top-color:var(--grn)}
  #pop .sev{font:700 10px var(--sans);letter-spacing:.12em;color:var(--pen)}
  #pop .sev.t2{color:var(--amber)} #pop .sev.t3{color:#6B7431}
  #pop h3{font:700 15px/1.3 var(--serif);margin:4px 0 5px;text-wrap:balance}
  #pop .claim{font:13px/1.5 var(--serif);color:#3C4956}
  #pop .conf{font:10.5px var(--sans);color:var(--mut);margin-top:6px}
  #pop .conf b{color:var(--grn)}
  #pop .rc{font:11px/1.5 var(--mono);color:#4A5866;background:#F4F6F8;
           border-left:2px solid var(--line);padding:4px 8px;margin-top:7px}
  #pop .rc b{color:var(--blue);font-weight:600}
  #pop .ord{font:12px/1.5 var(--mono);background:#F2F6FB;border:1px solid #CFE0F2;
            border-radius:5px;padding:8px 10px;margin-top:10px}
  #pop .ord .lbl{font:700 9.5px var(--sans);letter-spacing:.12em;color:var(--blue);
                 display:block;margin-bottom:3px}
  #pop .acts{display:flex;gap:8px;margin-top:11px;flex-wrap:wrap}
  #pop .acts button{font:600 12px var(--sans);border-radius:5px;padding:7px 13px;
                    cursor:pointer;border:1px solid var(--line);background:#fff;
                    color:var(--mut)}
  #pop .acts .a{background:var(--blue);border-color:var(--blue);color:#fff}
  #pop .chips{display:none;gap:6px;margin-top:8px;flex-wrap:wrap}
  #pop .chips button{font:600 11px var(--sans);border-radius:12px;padding:4px 11px;
                     border:1px solid var(--line);background:#fff;color:var(--mut);
                     cursor:pointer}
  #pop .status{font:600 12px var(--sans);margin-top:10px}
  #pop .status.ok{color:var(--grn)} #pop .status.no{color:var(--mut)}
  #pop .x{position:absolute;top:8px;right:12px;color:var(--mut);cursor:pointer;
          font-size:15px;background:none;border:0}
  footer{position:fixed;bottom:0;left:0;right:0;background:var(--chrome);
         border-top:1px solid var(--line);padding:5px 20px;font:10.5px var(--sans);
         color:var(--mut);display:flex;gap:14px;flex-wrap:wrap;z-index:5}
  footer a{color:var(--mut)}
  #meter{margin-left:auto;font:10.5px var(--mono);font-variant-numeric:tabular-nums}
</style>
</head>
<body>
<div class="banner">
  <span class="pt" id="pt">—</span><span class="demo" id="ptdemo"></span>
  <div class="right">
    <div id="gpill" title="the gauntlet is running in the background — click for the discharge tab">
      <span class="dots"><i></i><i></i><i></i><i></i></span>
      <span id="gpilltxt">attacking…</span>
    </div>
    <select id="caseSel">
      <option value="eleanor">Vance, Eleanor — discharge 07/16 (featured demo)</option>
    </select>
    <button class="runbtn" id="run">▶ Run the Gauntlet</button>
  </div>
</div>
<div class="tabs" id="tabs"></div>
<div class="chipbar">
  <span id="findchip"></span><span id="verifychip"></span><span id="residchip"></span>
</div>

<div class="page">
  <div id="panes"></div>
  <div id="planextras" style="display:none">
    <div id="flist"></div>
  </div>
</div>

<div id="pop" role="dialog"><button class="x" id="popx">✕</button><div id="popbody"></div></div>

<footer>
  <span>The Gauntlet — adversarial review inside the chart. Findings are reviewed
  arguments with verbatim receipts, not certifications; the clinician decides
  everything. Synthetic data.</span>
  <span><a href="/md">sheet</a> · <a href="/corridor">corridor</a> ·
  <a href="/classic">classic</a></span>
  <span id="meter">0s · $0.00</span>
</footer>

<script>
const $ = id => document.getElementById(id);
const pinnedRun = new URLSearchParams(location.search).get('run');
let runDir = pinnedRun;
let nLines = 0, meta = null, findings = [], decisions = {};
let fixSubmitted = false, sawFixEvents = false, docLoaded = false;
let killn = 0, agentsLive = 0, attackTotal = 0, running = false;
let planPane = null, planRaw = '', planEdited = false, pinned = null, insCursor = null;
let fixState = {}, verified = false;  // event-sourced truth, immune to fetch races
const LETTERS = 'ABCDEFGH';
const norm = s => s.replace(/[—–−]/g, '-').replace(/[‘’]/g, "'")
                   .replace(/[“”]/g, '"').replace(/\s+/g, ' ').trim().toLowerCase();

/* ---------- tabs ---------- */
const TABDEFS = [
  ['overview', 'Overview', /demographic|problem|social|advance care|goals/i],
  ['notes', 'Notes', /h&p|admission|hospital course|pt note|transcript/i],
  ['meds', 'Meds & Labs', /medication|labs|micro|fhir/i],
  ['records', 'Vitals & Records', /vitals|weights|outside|scanned|cardiology/i],
  ['plan', 'Discharge Plan', /under attack|under review|discharge order|summary draft|note \(soap|avs \(/i],
];
function tabFor(title) {
  for (const [id, , re] of TABDEFS) if (re.test(title)) return id;
  return 'notes';
}
function buildTabs() {
  $('tabs').innerHTML = '';
  $('panes').innerHTML = '';
  for (const [id, label] of TABDEFS) {
    const b = document.createElement('button');
    b.className = 'tab'; b.id = 'tab-' + id; b.dataset.pane = id;
    b.innerHTML = `${label}<span class="bdg" id="bdg-${id}"></span>`;
    b.onclick = () => selectTab(id);
    $('tabs').appendChild(b);
    const p = document.createElement('div');
    p.className = 'pane'; p.id = 'pane-' + id;
    $('panes').appendChild(p);
  }
  selectTab('plan');
}
function selectTab(id) {
  document.querySelectorAll('.tab').forEach(t =>
    t.classList.toggle('on', t.dataset.pane === id));
  document.querySelectorAll('.pane').forEach(p =>
    p.classList.toggle('on', p.id === 'pane-' + id));
  $('pop').style.display = 'none'; pinned = null;
}
function badge(tab, n, green) {
  const b = $('bdg-' + tab);
  if (!b) return;
  b.style.display = n ? 'inline-block' : 'none';
  b.textContent = n;
  b.classList.toggle('grn', !!green);
}

/* ---------- button + pill ---------- */
function setBtn(state) {
  const b = $('run');
  const S = { idle: [false, '▶ Run the Gauntlet', ''],
    running: [true, 'Running…', ''],
    decide: [false, '▶ Run the Gauntlet', ''],
    fixing: [true, 'Placing orders…', ''],
    rerun: [false, '⟳ Re-run the Gauntlet', 'rerun'],
    rerunning: [true, 'Re-running…', 'rerun'] }[state];
  b.disabled = S[0]; b.textContent = S[1];
  b.className = 'runbtn ' + S[2]; b.dataset.state = state;
}
function pill(show, txt, done) {
  $('gpill').style.display = show ? 'flex' : 'none';
  $('gpill').classList.toggle('done', !!done);
  if (txt) $('gpilltxt').innerHTML = txt;
}
$('gpill').onclick = () => selectTab('plan');

/* ---------- document ---------- */
async function loadDoc() {
  if (!meta || !meta.chart) return;
  try {
    const txt = await fetch('/' + meta.chart).then(r => r.text());
    const stripped = txt.replace(/<!--[\s\S]*?-->/g, '');
    buildTabs();
    planRaw = ''; planEdited = false; insCursor = null;
    let pane = $('pane-notes'), inPlan = false;
    for (const raw of stripped.split('\n')) {
      const line = raw.trimEnd();
      if (!line.trim()) continue;
      if (line.startsWith('# ')) {
        const t = line.slice(2);
        $('pt').textContent = t.replace(/SYNTHETIC PATIENT CHART[ —-]*/i, '')
          .replace(/\(.*\)/, '').replace(/AMBIENT ENCOUNTER[ —-]*/i, '')
          .trim().slice(0, 46) || 'Patient';
        $('ptdemo').textContent = 'synthetic chart — demo data';
        continue;
      }
      if (line.startsWith('## ')) {
        const title = line.slice(3);
        const tid = tabFor(title);
        pane = $('pane-' + tid);
        inPlan = tid === 'plan';
        const h = document.createElement('h4');
        h.textContent = title.replace(/[—-]? ?THE (PLAN|DOCUMENTATION) UNDER ATTACK/i,
          ' — under review');
        pane.appendChild(h);
        if (inPlan && !planPaneReady()) addPlanBar(pane);
        continue;
      }
      const d = document.createElement('div'); d.className = 'ln';
      d.textContent = line.replace(/^[-*] /, '');
      pane.appendChild(d);
      if (inPlan) { planRaw += line + '\n'; insCursor = d; }
    }
    planPane = $('pane-plan');
    $('pane-plan').appendChild($('planextras'));
    $('planextras').style.display = 'block';
    docLoaded = true;
    inkMarks();
    flushIns();
  } catch (err) {}
}
function planPaneReady() { return !!document.querySelector('#pane-plan .planbar'); }
function addPlanBar(pane) {
  const bar = document.createElement('div');
  bar.className = 'planbar';
  bar.innerHTML = `<span class="cap">The section the gauntlet attacks. Edit it, then
    run again.</span><button class="editbtn" id="editbtn">✎ Edit plan</button>`;
  pane.appendChild(bar);
  const note = document.createElement('div');
  note.className = 'editnote'; note.id = 'editnote';
  note.textContent = 'Plan edited — the next run attacks your edited version.';
  pane.appendChild(note);
  const ta = document.createElement('textarea');
  ta.id = 'planedit';
  pane.appendChild(ta);
  bar.querySelector('#editbtn').onclick = () => toggleEdit();
}
function toggleEdit() {
  const ta = $('planedit'), btn = $('editbtn');
  const lns = [...document.querySelectorAll('#pane-plan .ln')];
  if (ta.style.display !== 'block') {
    ta.value = planRaw.trim();
    ta.style.display = 'block';
    lns.forEach(l => l.style.display = 'none');
    btn.textContent = '✓ Done editing';
  } else {
    if (ta.value.trim() !== planRaw.trim()) {
      planRaw = ta.value.trim() + '\n';
      planEdited = true;
      $('editnote').style.display = 'block';
      lns.forEach(l => l.remove());
      const frag = document.createDocumentFragment();
      for (const line of planRaw.trim().split('\n')) {
        const d = document.createElement('div');
        d.className = 'ln'; d.textContent = line.replace(/^[-*] /, '');
        frag.appendChild(d);
        insCursor = d;
      }
      ta.after(frag);
    } else {
      lns.forEach(l => l.style.display = '');
    }
    ta.style.display = 'none';
    btn.textContent = '✎ Edit plan';
  }
}

/* ---------- marks ---------- */
function inkMarks() {
  if (!docLoaded) return;
  const lns = [...document.querySelectorAll('.ln')];
  const perTab = {};
  findings.forEach((f, i) => {
    const letter = LETTERS[i] || '+';
    let anchor = document.querySelector(`.ln[data-ex="${letter}"]`);
    if (!anchor) {
      for (const len of [60, 35]) {
        for (const q of (f.quotes || []).slice(0, 3)) {
          const frag = norm(String((q.quote || '').split('...')[0]).slice(0, 80));
          if (frag.length < 8) continue;
          anchor = lns.find(l => !l.dataset.ex &&
            norm(l.textContent).includes(frag.slice(0, len)));
          if (anchor) break;
        }
        if (anchor) break;
      }
      if (anchor) {
        anchor.classList.add('marked');
        anchor.dataset.ex = letter;
        const c = document.createElement('span');
        c.className = 'exchip'; c.textContent = letter;
        anchor.appendChild(c);
        anchor.onclick = ev => { ev.stopPropagation(); showPop(f, i, anchor, true); };
        anchor.onmouseenter = () => { if (!pinned) showPop(f, i, anchor, false); };
      }
    }
    if (anchor) {
      const tab = anchor.closest('.pane').id.replace('pane-', '');
      f._tab = tab;
      perTab[tab] = (perTab[tab] || 0) + 1;
    }
    applyState(f, i);
  });
  const allDone = findings.length && findings.every(f =>
    f._state || decisions[f.id]);
  for (const [id] of TABDEFS)
    badge(id, perTab[id] || 0, allDone);
  renderFlist();
}
function stateOf(f) {
  const fs = fixState[f.id];
  if (fs) return fs.state;
  const d = decisions[f.id];
  if (d === 'fix') return 'accepted';
  if ((d || '').startsWith('dismiss')) return 'waiving';
  return null;
}
function applyState(f, i) {
  const el = document.querySelector(`.ln[data-ex="${LETTERS[i]}"]`);
  if (!el) return;
  el.classList.remove('resolved', 'waived');
  const s = stateOf(f);
  if (s === 'fixed' || s === 'accepted') el.classList.add('resolved');
  else if (s === 'dismissed' || s === 'waiving') el.classList.add('waived');
}
function refreshStates() {
  findings.forEach((f, i) => applyState(f, i));
  renderFlist();
}
function renderFlist() {
  const fl = $('flist');
  if (!findings.length) { fl.innerHTML = ''; return; }
  fl.innerHTML = '<h4>Findings — adversarial review</h4>';
  findings.forEach((f, i) => {
    const d = document.createElement('div');
    const s = stateOf(f);
    const st = (s === 'fixed' || s === 'accepted') ? 'resolved'
      : (s === 'dismissed' || s === 'waiving') ? 'waived' : '';
    d.className = 'fl ' + st;
    const tabName = (TABDEFS.find(t => t[0] === f._tab) || ['', 'chart'])[1];
    d.innerHTML = `<span class="l">${LETTERS[i]}</span>${f.title}
      <small>· ${f.tier_label || ''} · in ${tabName}</small>`;
    d.onclick = ev => {
      ev.stopPropagation();
      const a = document.querySelector(`.ln[data-ex="${LETTERS[i]}"]`);
      if (a) { if (f._tab) selectTab(f._tab);
        a.scrollIntoView({ block: 'center' }); showPop(f, i, a, true); }
      else showPop(f, i, d, true);  // unanchored finding — popover on the list row
    };
    fl.appendChild(d);
  });
}

/* ---------- popover ---------- */
function showPop(f, i, anchor, pin) {
  pinned = pin ? f.id : pinned;
  const sevCls = f.tier === 2 ? 't2' : f.tier === 3 ? 't3' : '';
  const s = stateOf(f);
  const single = f.found_by === 1 ? ' · single-source, gate-confirmed' : '';
  let acts;
  if (s === 'fixed') acts = verified
    ? `<div class="status ok">✓ Orders placed — re-verified, nothing survived</div>`
    : `<div class="status ok">✓ Orders placed — unverified until re-run</div>`;
  else if (s === 'dismissed') acts =
    `<div class="status no">✗ Dismissed — “${(fixState[f.id] || {}).why || 'rationale recorded'}”</div>`;
  else if (s === 'accepted') acts =
    `<div class="status ok">✓ Accepted — order staged; transmits when all findings are decided</div>`;
  else if (s === 'waiving') acts =
    `<div class="status no">✗ Dismissed — recorded</div>`;
  else acts =
    `<div class="acts"><button class="a" id="pacc">Accept — stage order</button>
     <button id="pdis">Dismiss…</button></div>
     <div class="chips" id="pchips">
       <button data-r="clinically addressed">clinically addressed</button>
       <button data-r="known to me — monitoring in place">known — monitored</button>
       <button data-r="disagree with the evidence">disagree w/ evidence</button></div>`;
  $('popbody').innerHTML =
    `<span class="sev ${sevCls}">${f.tier_label || ''}</span>
     <h3>${f.title}</h3>
     <div class="claim">${f.claim || ''}</div>
     <div class="conf">found independently by ${f.found_by} of ${attackTotal || 30}${single}
       · <b>receipts machine-verified ✓</b> · ${f.citation || ''}</div>` +
    (f.quotes || []).slice(0, 2).map(q =>
      `<div class="rc"><b>${q.section}</b> — “${(q.quote || '').slice(0, 100)}”</div>`).join('') +
    `<div class="ord"><span class="lbl">STAGED ORDER</span>${f.proposed_order || ''}</div>` + acts;
  const pop = $('pop');
  pop.className = (s === 'fixed' || s === 'accepted') ? 'res' : '';
  pop.style.display = 'block';
  const r = anchor.getBoundingClientRect();
  pop.style.top = (r.bottom + window.scrollY + 6) + 'px';
  pop.style.left = Math.max(8, Math.min(r.left + window.scrollX,
    window.scrollX + document.documentElement.clientWidth - 450)) + 'px';
  requestAnimationFrame(() => {  // flip above the anchor if clipped below
    const pr = pop.getBoundingClientRect();
    if (pr.bottom > window.innerHeight - 34)
      pop.style.top = Math.max(window.scrollY + 8,
        r.top + window.scrollY - pr.height - 8) + 'px';
  });
  const acc = $('pacc'), dis = $('pdis');
  if (acc) acc.onclick = () => decide(f, i, 'fix');
  if (dis) dis.onclick = () => { $('pchips').style.display = 'flex'; };
  document.querySelectorAll('#pchips button').forEach(b =>
    b.onclick = () => decide(f, i, 'dismiss:' + b.dataset.r));
}
$('popx').onclick = () => { $('pop').style.display = 'none'; pinned = null; };
document.addEventListener('click', e => {
  if (!$('pop').contains(e.target) && !e.target.classList.contains('marked'))
    { $('pop').style.display = 'none'; pinned = null; }
});
function decide(f, i, d) {
  if (fixSubmitted || sawFixEvents) return;
  decisions[f.id] = d;
  applyState(f, i); renderFlist();
  const a = document.querySelector(`.ln[data-ex="${LETTERS[i]}"]`);
  if (a) showPop(f, i, a, true);
  maybeSubmitFix();
}
function maybeSubmitFix() {
  if (fixSubmitted || sawFixEvents || !findings.length) return;
  if (findings.some(f => !decisions[f.id])) return;
  fixSubmitted = true;
  setBtn('fixing');
  $('pop').style.display = 'none'; pinned = null;
  const dismiss = findings.filter(f => decisions[f.id].startsWith('dismiss'))
    .map(f => ({ id: f.id, rationale: decisions[f.id].slice(8) || 'clinician judgment' }));
  fetch('/api/fix', { method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ run: runDir, dismiss }) }).catch(() => {});
}

/* ---------- findings + insertions ---------- */
async function loadFindings() {
  try {
    findings = await fetch('/' + runDir + '/findings.json').then(r => r.json());
    running = false;
    if (!findings.length) {
      pill(true, 'complete — nothing survived review', true);
      $('findchip').style.display = 'none';
      setBtn('idle');
      return;
    }
    inkMarks(); refreshStates();
    if (verified) {  // fetch resolved after a replayed banner — don't clobber the end state
      pill(true, 're-verified clean', true);
      $('findchip').style.display = 'none';
      setBtn('idle');
      return;
    }
    pill(true, `<b>${findings.length}</b> findings — in the chart`, true);
    if (!sawFixEvents) {
      $('findchip').style.display = 'inline-block';
      $('findchip').textContent =
        `${findings.length} findings survived review — each needs a decision`;
      $('findchip').onclick = () => selectTab('plan');
      setBtn('decide');
    }
  } catch (err) {}
}
let pendingIns = [];
function insertOrder(text) {
  if (!docLoaded) { pendingIns.push(text); return; }
  const d = document.createElement('div');
  d.className = 'ins';
  d.innerHTML = `<span class="tag">+ ORDER ADDED BY CLINICIAN</span>${text}`;
  if (insCursor && insCursor.parentNode)
    insCursor.parentNode.insertBefore(d, insCursor.nextSibling);
  else if (planPane) planPane.insertBefore(d, $('planextras'));
  insCursor = d;
}
function flushIns() { const q = pendingIns; pendingIns = []; q.forEach(insertOrder); }

/* ---------- events ---------- */
function handle(e) {
  switch (e.type) {
    case 'attack_begin':
      if (!attackTotal) attackTotal = e.agents;
      killn = 0; agentsLive = 0;
      pill(true, `launching ${e.agents} reviewers · ${e.lanes} dimensions`);
      break;
    case 'attacker_start': agentsLive++; break;
    case 'objection':
      pill(true, `${agentsLive} attacking · <b>${killn}</b> refuted`);
      break;
    case 'judge_begin':
      pill(true, `judge — ${e.objections} objections · refute by default`);
      break;
    case 'gate_begin':
      pill(true, `confirmation gate — ${e.candidates} candidate(s)`);
      break;
    case 'killed':
      killn++;
      pill(true, `judging · <b>${killn}</b> refuted — ${e.test}`);
      break;
    case 'cluster_done':
      pill(true, `${e.findings} finding(s) — verifying receipts…`);
      break;
    case 'receipts_enforced': loadFindings(); break;
    case 'meter':
      $('meter').textContent = `${e.t.toFixed(0)}s · $${e.cost.toFixed(2)} — measured`;
      break;
    case 'order_emitted':
      sawFixEvents = true;
      fixState[e.finding] = { state: 'fixed' };
      insertOrder(e.order);
      refreshStates();
      break;
    case 'covered':
      sawFixEvents = true;
      fixState[e.finding] = { state: 'fixed' };
      refreshStates();
      break;
    case 'dismissed':
      sawFixEvents = true;
      fixState[e.finding] = { state: 'dismissed', why: e.rationale };
      refreshStates();
      break;
    case 'amendment_written':
      $('findchip').textContent =
        `plan amended — ${e.orders} orders · not yet re-verified`;
      if (meta) meta.chart = runDir + '/amended-chart.md';
      setBtn('rerun');
      pill(true, 'plan amended — re-run required', true);
      break;
    case 'reverify_begin':
      running = true;
      setBtn('rerunning');
      pill(true, 're-attacking the fixed dimensions…');
      break;
    case 'banner': {
      running = false; verified = true;
      const stats = (e.text.split(' — ')[1] || '')
        .replace(/ ?· attacked and not broken/, '');
      $('verifychip').style.display = 'inline-block';
      $('verifychip').innerHTML = `0 surviving objections — ${stats}
        <small>· attacked and not broken · not a safety certification</small>`;
      $('findchip').style.display = 'none';
      pill(true, `re-verified clean — ${stats}`, true);
      refreshStates(); inkMarks();
      setBtn('idle');
      break; }
    case 'residual_gaps':
      running = false;
      $('residchip').style.display = 'inline-block';
      $('residchip').textContent =
        `${e.count} objection(s) survived re-verification — the fix was incomplete`;
      pill(true, `${e.count} residual gap(s)`, true);
      setBtn('rerun');
      break;
  }
}

/* ---------- controls ---------- */
$('run').onclick = async () => {
  const state = $('run').dataset.state || 'idle';
  if (state === 'rerun') {
    running = true; setBtn('rerunning');
    await fetch('/api/reverify', { method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ run: runDir }) }).catch(() => setBtn('rerun'));
    return;
  }
  running = true; setBtn('running');
  pill(true, 'launching…');
  const c = $('caseSel').value;
  const body = c === 'eleanor'
    ? { target: 'eleanor', plan_text: planEdited ? planRaw : '' }
    : { encounter: c };
  await fetch('/api/attack', { method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body) }).catch(() => { setBtn('idle'); running = false; });
};

function resetView() {
  nLines = 0; meta = null; findings = []; decisions = {};
  fixSubmitted = false; sawFixEvents = false; docLoaded = false;
  killn = 0; agentsLive = 0; attackTotal = 0; pinned = null;
  planRaw = ''; planEdited = false; insCursor = null; pendingIns = [];
  fixState = {}; verified = false;
  $('pop').style.display = 'none';
  $('verifychip').style.display = 'none'; $('residchip').style.display = 'none';
  $('findchip').style.display = 'none';
  $('meter').textContent = '0s · $0.00';
}
async function latest() {
  if (pinnedRun) return pinnedRun;  // ?run= pins the view — no auto-follow
  const r = await fetch('/api/latest').then(r => r.json()).catch(() => null);
  return (r && r.run) || runDir;
}
async function poll() {
  const rd = await latest();
  if (rd) {
    if (rd !== runDir) { runDir = rd; resetView(); }
    if (!meta) {
      meta = await fetch('/' + runDir + '/meta.json').then(r => r.json()).catch(() => null);
      if (meta) loadDoc();
    }
    const txt = await fetch('/' + runDir + '/events.jsonl').then(r => r.text()).catch(() => '');
    const lines = txt.split('\n').filter(Boolean);
    for (let i = nLines; i < lines.length; i++) {
      try { handle(JSON.parse(lines[i])); } catch (err) {}
    }
    nLines = lines.length;
  }
  setTimeout(poll, 400);
}
async function loadCases() {
  // every encounter in the organizer dataset becomes a runnable case
  try {
    const s = await fetch('/assets/abridge-dataset/summary.json').then(r => r.json());
    for (const rec of (s.index || [])) {
      const o = document.createElement('option');
      o.value = rec.id;
      const t = rec.visit_title || rec.id;
      o.textContent = (t.length > 56 ? t.slice(0, 55) + '…' : t)
        + ` — ${(rec.date || '').slice(0, 10)}`;
      $('caseSel').appendChild(o);
    }
  } catch (err) {}
}
buildTabs();
setBtn('idle');
loadCases();
poll();
</script>
</body>
</html>
